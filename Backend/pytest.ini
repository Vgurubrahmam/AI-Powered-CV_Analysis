[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summaries for: failures, errors, passed
addopts =
    -ra
    --tb=short
    --strict-markers
    -q

markers =
    unit: Pure unit tests (no DB, no external services)
    integration: Integration tests (require test DB)
    e2e: End-to-end API tests (require full app)
    slow: Tests that take >5s to run

# Filter noisy warnings
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*:
    ignore::PendingDeprecationWarning
