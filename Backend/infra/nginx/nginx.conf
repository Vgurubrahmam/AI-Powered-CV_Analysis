worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"request_id":"$http_x_request_id"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ── Security headers ──────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         DENY always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:5m  rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream — FastAPI ────────────────────────────────────────────────────
    upstream fastapi {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 12M;   # slightly above FILE_MAX_SIZE_MB=10
        client_body_timeout  30s;

        # ── Health check (no rate limit) ─────────────────────────────────────
        location = /health {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Metrics endpoint (internal only) ─────────────────────────────────
        location = /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://fastapi;
        }

        # ── Auth endpoints (strict rate limit) ───────────────────────────────
        location ~ ^/api/v1/auth/(login|refresh) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_conn conn_limit 5;
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id;
        }

        # ── API (general rate limit) ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 20;

            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_set_header   Connection        "";

            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
        }

        # ── Docs (dev only — disable in production via APP_ENV) ───────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Default: 404 ─────────────────────────────────────────────────────
        location / {
            return 404 '{"error":"not_found","message":"Resource not found"}';
            add_header Content-Type application/json always;
        }
    }
}
