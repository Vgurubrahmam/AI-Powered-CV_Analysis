# ============================================================
#  ATS Platform — Full Stack Docker Compose
#  Services: API, Celery Worker, Beat, PostgreSQL, Redis, MinIO, ClamAV, Nginx
# ============================================================

x-common-env: &common-env
  DATABASE_URL: "postgresql+asyncpg://ats_user:ats_pass@postgres:5432/ats_db"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_BUCKET_NAME: "ats-resumes"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  AWS_REGION: "us-east-1"
  CLAMAV_HOST: "clamav"
  CLAMAV_PORT: "3310"
  APP_ENV: "development"
  LOG_LEVEL: "INFO"

services:

  # ── PostgreSQL 16 with pgvector ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ats_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: ats_pass
      POSTGRES_DB: ats_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats_user -d ats_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ats_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ats_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── MinIO bucket initializer (one-shot) ──────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: ats_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/ats-resumes &&
        mc anonymous set none local/ats-resumes &&
        echo 'Bucket initialized.';
      "
    restart: "no"

  # ── ClamAV antivirus daemon ───────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    container_name: ats_clamav
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s  # allow time for DB update on first run

  # ── FastAPI application ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ats_api
    restart: unless-stopped
    environment:
      <<: *common-env
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro   # dev hot-reload via bind mount
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Celery worker (all queues) ────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ats_worker
    restart: unless-stopped
    environment:
      <<: *common-env
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --queues=default,parsing,embeddings,llm
      --concurrency=4
      --max-tasks-per-child=100

  # ── Celery Beat (scheduler) ───────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ats_beat
    restart: unless-stopped
    environment:
      <<: *common-env
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.beat_schedule beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  # ── Celery Flower (monitoring UI) ─────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: ats_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: "redis://redis:6379/1"
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery flower --broker=redis://redis:6379/1 --port=5555

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ats_nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  clamav_data:
